<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Alp Efe Karalar</title>
  <meta name="description" content="Project details" />
  <link rel="icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ─── Navigation ─── -->
<nav class="site-nav" id="nav">
  <div class="container">
    <a href="https://alpkaralar.com" class="nav-logo" aria-label="Alp Karalar home">
      <span class="nav-logo-dot" aria-hidden="true"></span>
      alp karalar
    </a>
    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      All Projects
    </a>
  </div>
</nav>

<main id="main-content"></main>

<!-- ─── Footer ─── -->
<footer class="site-footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="https://alpkaralar.com" class="footer-link">alpkaralar.com</a>
        <a href="index.html" class="footer-link">Projects</a>
        <a href="https://github.com/efekaralar" target="_blank" rel="noopener noreferrer" class="footer-link">GitHub</a>
        <a href="https://www.linkedin.com/in/alp-efe-karalar/" target="_blank" rel="noopener noreferrer" class="footer-link">LinkedIn</a>
      </div>
      <p class="footer-copy">© <span id="year"></span> Alp Efe Karalar</p>
    </div>
  </div>
</footer>

<script src="data.js"></script>
<script>
// ─── SVG icons ─────────────────────────────────────────────────────────────
const ICON_GITHUB = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.478 2 2 6.59 2 12.252c0 4.528 2.865 8.37 6.839 9.727.5.097.683-.222.683-.494 0-.244-.009-.891-.014-1.748-2.782.617-3.369-1.387-3.369-1.387-.455-1.181-1.11-1.496-1.11-1.496-.908-.638.069-.625.069-.625 1.004.072 1.532 1.056 1.532 1.056.892 1.57 2.341 1.116 2.91.853.091-.665.349-1.116.635-1.372-2.221-.258-4.555-1.14-4.555-5.073 0-1.12.39-2.036 1.029-2.754-.103-.259-.446-1.301.098-2.712 0 0 .84-.276 2.75 1.052A9.38 9.38 0 0 1 12 6.862c.85.004 1.706.117 2.504.344 1.909-1.328 2.748-1.052 2.748-1.052.546 1.411.202 2.453.1 2.712.64.718 1.028 1.634 1.028 2.754 0 3.943-2.338 4.812-4.566 5.065.359.319.678.948.678 1.911 0 1.379-.012 2.492-.012 2.831 0 .274.18.595.688.493C19.138 20.618 22 16.778 22 12.252 22 6.59 17.522 2 12 2Z"/></svg>`;

const ICON_EXTERNAL = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

const ICON_BLOG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`;

const ICON_BACK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"></polyline></svg>`;

const ICON_CLOCK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;

const ICON_TAG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>`;

const ICON_CALENDAR = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>`;

const ICON_IMAGE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;

const ICON_ARROW_RIGHT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;

// ─── Helpers ───────────────────────────────────────────────────────────────
function getCatLabel(id) {
  return CATEGORIES.find(c => c.id === id)?.label ?? id;
}

function formatDate(dateStr) {
  const [y, m] = dateStr.split("-");
  return new Date(+y, +m - 1).toLocaleDateString("en-US", { month: "long", year: "numeric" });
}

function escapeHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function formatDescription(text) {
  return text
    .split("\n\n")
    .map(p => `<p>${escapeHtml(p.trim())}</p>`)
    .join("");
}

// ─── Nav scroll ────────────────────────────────────────────────────────────
const nav = document.getElementById("nav");
window.addEventListener("scroll", () => {
  nav.classList.toggle("scrolled", window.scrollY > 10);
}, { passive: true });

// ─── Year ──────────────────────────────────────────────────────────────────
document.getElementById("year").textContent = new Date().getFullYear();

// ─── Get project ID from URL ───────────────────────────────────────────────
const params  = new URLSearchParams(window.location.search);
const id      = params.get("id");
const project = PROJECTS.find(p => p.id === id);

// ─── Not found ─────────────────────────────────────────────────────────────
if (!project) {
  document.getElementById("main-content").innerHTML = `
    <div class="not-found">
      <div class="not-found-code">404</div>
      <h2>Project not found</h2>
      <p>The project you're looking for doesn't exist or has been removed.</p>
      <a href="index.html" class="btn-back">${ICON_BACK} Back to Projects</a>
    </div>
  `;
} else {
  // ─── Update page meta ─────────────────────────────────────────────────
  document.title = `${project.title} — Alp Efe Karalar`;
  document.querySelector('meta[name="description"]').setAttribute(
    "content",
    project.shortDescription
  );

  // ─── Links ────────────────────────────────────────────────────────────
  const hasGithub = !!project.githubUrl;
  const hasDemo   = !!project.demoUrl && project.demoUrl !== project.githubUrl;
  const hasBlog   = !!project.blogUrl;

  const linkItems = [
    hasGithub ? {
      href: project.githubUrl,
      icon: ICON_GITHUB,
      label: "View on GitHub",
      sub: "Source code",
    } : null,
    hasDemo ? {
      href: project.demoUrl,
      icon: ICON_EXTERNAL,
      label: "Live Demo",
      sub: "See it in action",
    } : null,
    hasBlog ? {
      href: project.blogUrl,
      icon: ICON_BLOG,
      label: "Read Blog Post",
      sub: "Technical write-up",
    } : null,
  ].filter(Boolean);

  const linksHTML = linkItems.length > 0 ? `
    <div class="sidebar-block">
      <div class="sidebar-block-label">Links</div>
      <div class="sidebar-links">
        ${linkItems.map(l => `
          <a href="${l.href}" target="_blank" rel="noopener noreferrer" class="sidebar-link">
            ${l.icon}
            <span class="sidebar-link-text">${l.label}</span>
            ${ICON_EXTERNAL.replace('aria-hidden="true"', 'class="sidebar-link-arrow" aria-hidden="true"')}
          </a>
        `).join("")}
      </div>
    </div>
  ` : "";

  // ─── Category badges ──────────────────────────────────────────────────
  const catBadges = project.category.map(c =>
    `<span class="detail-cat">${getCatLabel(c)}</span>`
  ).join("");

  // ─── Tech sidebar ─────────────────────────────────────────────────────
  const techHTML = `
    <div class="sidebar-block">
      <div class="sidebar-block-label">Tech Stack</div>
      <div class="sidebar-tech">
        ${project.techStack.map(t => `<span class="sidebar-tech-tag">${t}</span>`).join("")}
      </div>
    </div>
  `;

  // ─── Meta sidebar ─────────────────────────────────────────────────────
  const metaHTML = `
    <div class="sidebar-block">
      <div class="sidebar-block-label">Details</div>
      <div class="sidebar-meta-list">
        <div class="sidebar-meta-row">
          <span class="meta-key">Timeline</span>
          <span class="meta-val">${project.timeline}</span>
        </div>
        <div class="sidebar-meta-row">
          <span class="meta-key">Date</span>
          <span class="meta-val">${formatDate(project.date)}</span>
        </div>
        <div class="sidebar-meta-row">
          <span class="meta-key">Category</span>
          <span class="meta-val">${project.category.map(getCatLabel).join(", ")}</span>
        </div>
      </div>
    </div>
  `;

  // ─── Related projects ─────────────────────────────────────────────────
  const related = PROJECTS
    .filter(p => p.id !== project.id && p.category.some(c => project.category.includes(c)))
    .slice(0, 3);

  const relatedHTML = related.length > 0 ? `
    <section class="related-section" aria-label="Related projects">
      <div class="container">
        <h2 class="related-heading">More Projects</h2>
        <div class="related-grid">
          ${related.map((p, i) => renderRelatedCard(p, i)).join("")}
        </div>
      </div>
    </section>
  ` : "";

  // ─── Render ───────────────────────────────────────────────────────────
  document.getElementById("main-content").innerHTML = `
    <!-- Hero -->
    <section class="detail-hero">
      <div class="container">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="index.html">${ICON_BACK} Projects</a>
          <span class="sep" aria-hidden="true">/</span>
          <span class="current">${project.title}</span>
        </nav>
        <div class="detail-cats">${catBadges}</div>
        <h1 class="detail-title">${project.title}</h1>
        <p class="detail-subtitle">${project.subtitle || project.shortDescription}</p>
        <div class="detail-meta">
          <span class="detail-meta-item">${ICON_CLOCK} ${project.timeline}</span>
          <span class="detail-meta-item">${ICON_CALENDAR} ${formatDate(project.date)}</span>
        </div>
      </div>
    </section>

    <!-- Image -->
    <section class="detail-image-section">
      <div class="container">
        <div class="detail-image-wrap">
          <img
            class="detail-image"
            src="${project.image}"
            alt="${project.title} preview"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"
          />
          <div class="detail-image-placeholder" style="display:none">
            ${ICON_IMAGE}
            <span>No preview available</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Main content -->
    <section class="detail-content container">
      <!-- Description -->
      <div class="detail-description">
        <p class="section-label">Overview</p>
        <div class="description-text">
          ${formatDescription(project.fullDescription)}
        </div>
      </div>

      <!-- Sidebar -->
      <aside class="detail-sidebar">
        ${linksHTML}
        ${techHTML}
        ${metaHTML}
      </aside>
    </section>

    <!-- Related -->
    ${relatedHTML}
  `;

  // ─── Wire up related card clicks ─────────────────────────────────────
  document.querySelectorAll(".project-card").forEach(card => {
    const navigate = () => {
      window.location.href = `project.html?id=${card.dataset.id}`;
    };
    card.addEventListener("click", navigate);
    card.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); navigate(); }
    });
  });
}

// ─── Related card renderer ─────────────────────────────────────────────────
function renderRelatedCard(p, i) {
  const catBadges = p.category.map(c =>
    `<span class="card-cat">${getCatLabel(c)}</span>`
  ).join("");

  return `
    <article
      class="project-card fade-up"
      data-id="${p.id}"
      role="button"
      tabindex="0"
      aria-label="View details for ${p.title}"
      style="animation-delay: ${i * 0.1}s"
    >
      <div class="card-image-wrap">
        <img
          class="card-image"
          src="${p.image}"
          alt="${p.title} preview"
          loading="lazy"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"
        />
        <div class="card-placeholder" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="width:36px;height:36px;color:var(--border)"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
      </div>
      <div class="card-body">
        <div class="card-cats">${catBadges}</div>
        <h2 class="card-title">${p.title}</h2>
        <p class="card-desc">${p.shortDescription}</p>
      </div>
      <div class="card-footer">
        <div class="card-links"></div>
        <span class="card-view-btn">View ${ICON_ARROW_RIGHT}</span>
      </div>
    </article>
  `;
}
</script>
</body>
</html>
